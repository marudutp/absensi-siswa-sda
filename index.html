<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack.pro - Loading...</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --primary: #007bff; 
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --light: #f0f2f5;
            --dark: #333;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; padding: 20px; background: var(--light); color: var(--dark); margin: 0; }
        .container { max-width: 850px; margin: auto; padding-bottom: 50px; display: none; }
        
        /* --- MODIFIKASI LOGO BULAT --- */
        .school-logo-main { 
            width: 120px; /* Ukuran tetap agar bulat sempurna */
            height: 120px;
            object-fit: cover; /* Agar gambar tidak gepeng */
            border-radius: 50%; /* Membuat jadi bulat */
            border: 4px solid var(--primary); /* Bingkai mengikuti warna tema */
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            margin-bottom: 15px; 
            display: none; 
            margin-left: auto; 
            margin-right: auto;
            background: white; /* Jaga-jaga kalau logo transparan */
        }

        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 30px; text-align: left; }
        .input-group { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .input-group label { width: 100px; font-weight: bold; font-size: 14px; }
        .input-group input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        
        #id-card-result { display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
        .id-card {
            width: 320px; height: 500px; background: white; border-radius: 20px;
            border: 1px solid #ccc; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            position: relative; overflow: hidden; display: none; margin-bottom: 20px;
        }
        .card-header { background: var(--primary); color: white; padding: 20px 10px; font-weight: bold; font-size: 18px; border-bottom: 6px solid rgba(0,0,0,0.1); text-align: center; }
        
        /* Logo di dalam kartu juga kita buat bulat kecil */
        .card-logo-img { 
            width: 60px; 
            height: 60px; 
            object-fit: cover; 
            border-radius: 50%; 
            border: 2px solid white;
            margin-bottom: 5px; 
            display: none; 
        }

        .card-body { padding: 20px; text-align: center; }
        .student-name { font-size: 22px; font-weight: bold; margin-top: 15px; text-transform: uppercase; color: #111; }
        #qrcode { display: flex; justify-content: center; margin: 20px 0; padding: 10px; background: #fff; }
        
        .btn { padding: 12px 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; color: white; transition: 0.3s; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-warning { background: var(--warning); color: #212529; }
        .btn-danger { background: var(--danger); }
        .btn-block { width: 100%; margin: 10px 0; font-size: 16px; }

        #reader { width: 100%; background: white; border-radius: 12px; overflow: hidden; border: 2px solid #ddd; margin-top: 15px; }
        .search-container { margin: 20px 0 10px 0; }
        .search-input { width: 100%; padding: 12px; border: 2px solid var(--primary); border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none; }

        .table-container { max-height: 450px; overflow-y: auto; background: white; border-radius: 10px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { position: sticky; top: 0; background: #f8f9fa; padding: 15px; font-size: 13px; z-index: 10; border-bottom: 2px solid #dee2e6; text-align: left; }
        td { border-bottom: 1px solid #eee; padding: 12px; font-size: 13px; text-align: left; }
        .note-input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 13px; }

        #loading-screen { padding-top: 100px; font-size: 20px; font-weight: bold; color: var(--primary); }

        @media print {
            body * { visibility: hidden; }
            #printableCard, #printableCard * { visibility: visible; }
            #printableCard { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); border: none; }
        }
    </style>
</head>
<body>

<div id="loading-screen">Menghubungkan ke EduTrack Engine...</div>

<div class="container" id="main-app">
    <img id="ui-logo" src="" class="school-logo-main">
    
    <h1 id="ui-school-name" style="margin-bottom: 5px;">School Name</h1>
    <p style="margin-top: 0; color: #666; margin-bottom: 30px;">Digital Management System</p>

    <div class="card">
        <h3 style="text-align: center; margin-top: 0;">ID Card Generator</h3>
        <div class="input-group">
            <label>Nama</label>
            <input type="text" id="inputNama" placeholder="Nama Lengkap Siswa...">
        </div>
        <div class="input-group">
            <label>Join Date</label>
            <input type="date" id="inputJoinDate">
        </div>
        <button class="btn btn-primary btn-block" onclick="generateIDCard()">Generate Kartu</button>
    </div>

    <div id="id-card-result">
        <div id="printableCard" class="id-card">
            <div class="card-header">
                <img id="card-logo" src="" class="card-logo-img"><br>
                <span id="card-school-name">SCHOOL</span><br>
                <span style="font-size: 11px; font-weight: normal; opacity: 0.9;">Student ID Card</span>
            </div>
            <div class="card-body">
                <div id="qrcode"></div>
                <div class="student-name" id="displayNama">NAMA SISWA</div>
                <div style="font-size: 14px; color: #666; margin-bottom: 20px;">Joined: <span id="displayJoinDate">-</span></div>
                <hr style="border: 0; border-top: 1px solid #eee;">
                <p style="font-size: 10px; color: #999; line-height: 1.4;" id="ui-footer-text">Kartu ID Resmi</p>
            </div>
        </div>
        
        <div id="actionButtons" style="margin-bottom: 30px; display: none; gap: 8px; justify-content: center;">
            <button class="btn btn-success" onclick="window.print()">Cetak</button>
            <button class="btn btn-warning" onclick="downloadImage()">Download PNG</button>
        </div>
    </div>

    <hr style="border: 0; border-top: 2px dashed #ccc; margin: 40px 0;">

    <h3>Absensi & Jurnal Guru</h3>
    <button id="start-btn" class="btn btn-success btn-block" onclick="startScanner()">Aktifkan Kamera</button>
    <div id="reader"></div>
    
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Cari nama siswa..." oninput="renderTable()">
    </div>

    <div style="display: flex; gap: 8px; margin-bottom: 10px;">
        <button class="btn btn-primary" style="flex: 1;" onclick="downloadCSV()">Download CSV</button>
        <button class="btn btn-danger" style="flex: 1;" onclick="clearData()">Hapus Data</button>
    </div>

    <div class="table-container">
        <table>
            <thead><tr><th>Siswa / ID</th><th>Waktu Scan</th><th>Catatan Pelajaran</th></tr></thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<script>
    let config = {};
    const urlParams = new URLSearchParams(window.location.search);
    const clientId = urlParams.get('id') || 'sda-music';

    async function loadConfig() {
        try {
            const response = await fetch(`clients/${clientId}.json`);
            if (!response.ok) throw new Error("Client ID salah");
            config = await response.json();
            applyConfig();
        } catch (err) {
            document.getElementById('loading-screen').innerText = "Akses Ditolak: Client tidak ditemukan.";
        }
    }

    function applyConfig() {
        document.title = config.school_name + " - EduTrack";
        document.getElementById('ui-school-name').innerText = config.school_name;
        document.getElementById('card-school-name').innerText = config.school_name;
        document.getElementById('ui-footer-text').innerText = config.footer_text;
        document.documentElement.style.setProperty('--primary', config.theme_color);
        
        if (config.logo_url) {
            const uiLogo = document.getElementById('ui-logo');
            const cardLogo = document.getElementById('card-logo');
            uiLogo.src = config.logo_url;
            uiLogo.style.display = 'block';
            cardLogo.src = config.logo_url;
            cardLogo.style.display = 'inline-block';
        }

        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        renderTable();
    }

    function generateIDCard() {
        const nama = document.getElementById('inputNama').value;
        const joinDate = document.getElementById('inputJoinDate').value;
        if(!nama || !joinDate) return alert("Lengkapi data!");
        document.getElementById('displayNama').innerText = nama;
        document.getElementById('displayJoinDate').innerText = joinDate;
        document.getElementById('printableCard').style.display = 'block';
        document.getElementById('actionButtons').style.display = 'flex';
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: `${clientId}-${nama}`, width: 160, height: 160 });
    }

    function downloadImage() {
        html2canvas(document.getElementById('printableCard'), { scale: 3 }).then(canvas => {
            const a = document.createElement('a');
            a.download = `ID-${document.getElementById('displayNama').innerText}.png`;
            a.href = canvas.toDataURL(); a.click();
        });
    }

    let html5QrCode;
    function startScanner() {
        document.getElementById('start-btn').style.display = 'none';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
            saveData(text); beep();
        });
    }

    function saveData(val) {
        let logs = JSON.parse(localStorage.getItem(`logs_${clientId}`)) || [];
        logs.unshift({ info: val, time: new Date().toLocaleString('id-ID'), ts: new Date(), note: "" });
        localStorage.setItem(`logs_${clientId}`, JSON.stringify(logs));
        renderTable();
    }

    function renderTable() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        let logs = JSON.parse(localStorage.getItem(`logs_${clientId}`)) || [];
        const filtered = logs.filter(l => l.info.toLowerCase().includes(search));
        document.getElementById('historyBody').innerHTML = filtered.map((i, idx) => `
            <tr>
                <td><strong>${i.info}</strong></td>
                <td>${i.time}</td>
                <td>
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="note-${idx}" class="note-input" value="${i.note || ''}" placeholder="Progres...">
                        <button class="btn btn-success" style="padding: 5px 10px; font-size: 11px;" onclick="saveNote(${idx})">Save</button>
                    </div>
                </td>
            </tr>`).join('');
    }

    function saveNote(idx) {
        let logs = JSON.parse(localStorage.getItem(`logs_${clientId}`)) || [];
        logs[idx].note = document.getElementById(`note-${idx}`).value;
        localStorage.setItem(`logs_${clientId}`, JSON.stringify(logs));
        alert("Disimpan!");
    }

    function clearData() {
        if (prompt("Password Guru:") === config.delete_password) {
            localStorage.removeItem(`logs_${clientId}`);
            renderTable();
        }
    }

    function downloadCSV() {
        let logs = JSON.parse(localStorage.getItem(`logs_${clientId}`)) || [];
        let csv = "ID,Waktu,Catatan\n" + logs.map(l => `"${l.info}","${l.time}","${l.note}"`).join("\n");
        const b = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `Rekap-${clientId}.csv`; a.click();
    }

    function beep() {
        const ctx = new AudioContext(); const osc = ctx.createOscillator(); osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.1);
    }

    loadConfig();
</script>
</body>
</html>
