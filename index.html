<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDA Music - Management System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 600px; margin: auto; }
        
        /* Form Styling */
        .form-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; text-align: left; }
        .input-group { margin-bottom: 15px; display: flex; align-items: center; }
        .input-group label { width: 100px; font-weight: bold; font-size: 14px; }
        .input-group input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        
        /* ID Card Styling */
        #id-card-result { display: flex; justify-content: center; margin-top: 20px; }
        .id-card {
            width: 300px; height: 480px; background: white; border-radius: 15px;
            border: 1px solid #ccc; box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            position: relative; overflow: hidden; display: none;
        }
        .card-header { background: #28a745; color: white; padding: 20px 10px; font-weight: bold; font-size: 18px; border-bottom: 5px solid #218838; text-align: center; }
        .card-body { padding: 20px; text-align: center; }
        .student-name { font-size: 20px; font-weight: bold; margin-top: 15px; text-transform: uppercase; }
        .join-date { font-size: 14px; color: #666; margin-bottom: 20px; }
        #qrcode { display: flex; justify-content: center; margin: 20px 0; }
        
        /* Buttons */
        .btn { padding: 12px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; color: white; transition: 0.3s; margin: 5px; }
        .btn-primary { background: #007bff; }
        .btn-success { background: #28a745; }
        .btn-warning { background: #ffc107; color: #212529; }
        .btn-danger { background: #dc3545; }
        .btn-block { width: 100%; margin: 10px 0; }

        /* Scanner & Table Styling */
        #reader { width: 100%; background: white; border-radius: 10px; overflow: hidden; border: 2px solid #ddd; margin-bottom: 20px; }
        
        /* PERBAIKAN SCROLL TABEL */
        .table-container {
            max-height: 350px; overflow-y: auto; background: white;
            border: 1px solid #ddd; border-radius: 8px; margin-top: 10px;
        }
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: #eee; padding: 10px; font-size: 13px; z-index: 10; }
        td { border-bottom: 1px solid #ddd; padding: 10px; font-size: 13px; }

        @media print {
            body * { visibility: hidden; }
            #id-card-result, #id-card-result * { visibility: visible; }
            #id-card-result { position: absolute; left: 0; top: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>SDA Music Management</h2>

    <div class="form-card">
        <h3 style="text-align: center;">Buat Kartu Siswa</h3>
        <div class="input-group">
            <label>Nama</label>
            <input type="text" id="inputNama" placeholder="Nama Lengkap">
        </div>
        <div class="input-group">
            <label>Join Date</label>
            <input type="date" id="inputJoinDate">
        </div>
        <button class="btn btn-primary btn-block" onclick="generateIDCard()">Generate Kartu</button>
    </div>

    <div id="id-card-result">
        <div id="printableCard" class="id-card">
            <div class="card-header">
                SDA MUSIC<br>
                <span style="font-size: 12px; font-weight: normal;">Student ID Card</span>
            </div>
            <div class="card-body">
                <div id="qrcode"></div>
                <div class="student-name" id="displayNama">NAMA SISWA</div>
                <div class="join-date">Joined: <span id="displayJoinDate">-</span></div>
                <hr>
                <p style="font-size: 10px; color: #999;">Tanda pengenal resmi siswa SDA Music</p>
            </div>
        </div>
    </div>

    <div style="margin-top: 15px;">
        <button id="btnPrint" class="btn btn-success" style="display:none;" onclick="window.print()">Cetak Kartu</button>
        <button id="btnDownload" class="btn btn-warning" style="display:none;" onclick="downloadImage()">Download Gambar</button>
    </div>

    <hr style="margin: 40px 0;">

    <h3>Absensi Scanner</h3>
    <button id="start-btn" class="btn btn-success btn-block" onclick="startScanner()">Aktifkan Kamera</button>
    <div id="reader"></div>
    
    <div id="result" style="display:none; background: #e7ffea; padding: 15px; border-radius: 8px; border: 1px solid #28a745; margin-bottom: 20px;">
        <strong>Terdeteksi:</strong> <br>
        <span id="scan-text" style="font-size: 16px; color: #28a745; font-weight: bold;"></span>
    </div>

    <div style="display: flex; gap: 5px;">
        <button class="btn btn-primary" style="flex: 1;" onclick="downloadCSV()">Download CSV</button>
        <button class="btn btn-danger" style="flex: 1;" onclick="clearData()">Hapus Semua</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr><th>Siswa / ID</th><th>Waktu Scan</th></tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<script>
    // LOGIC PEMBUAT KARTU
    function generateIDCard() {
        const nama = document.getElementById('inputNama').value;
        const joinDate = document.getElementById('inputJoinDate').value;
        if(!nama || !joinDate) return alert("Isi data dulu Lur!");

        document.getElementById('displayNama').innerText = nama;
        document.getElementById('displayJoinDate').innerText = joinDate;
        document.getElementById('printableCard').style.display = 'block';
        document.getElementById('btnPrint').style.display = 'inline-block';
        document.getElementById('btnDownload').style.display = 'inline-block';

        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: `SDA-${nama}-${joinDate}`,
            width: 150, height: 150
        });
    }

    function downloadImage() {
        const card = document.getElementById('printableCard');
        html2canvas(card, { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `SDA-${document.getElementById('displayNama').innerText}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    // LOGIC SCANNER
    let html5QrCode;
    function startScanner() {
        document.getElementById('start-btn').style.display = 'none';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 15, qrbox: 250 }, 
            (text) => {
                if(saveData(text)) {
                    document.getElementById('scan-text').innerText = text;
                    document.getElementById('result').style.display = 'block';
                    beep();
                }
            }
        ).catch(err => alert("Izin kamera ditolak atau error."));
    }

    function saveData(val) {
        const now = new Date();
        const timeStr = now.toLocaleString('id-ID');
        let logs = JSON.parse(localStorage.getItem('sda_logs')) || [];
        
        // Cooldown 3 detik
        if(logs.length > 0 && logs[0].info === val) {
            if(new Date() - new Date(logs[0].ts) < 3000) return false;
        }

        logs.unshift({ info: val, time: timeStr, ts: new Date() });
        localStorage.setItem('sda_logs', JSON.stringify(logs));
        renderTable();
        return true;
    }

    function renderTable() {
        let logs = JSON.parse(localStorage.getItem('sda_logs')) || [];
        document.getElementById('historyBody').innerHTML = logs.map(i => 
            `<tr><td>${i.info}</td><td>${i.time}</td></tr>`
        ).join('');
    }

    function downloadCSV() {
        let logs = JSON.parse(localStorage.getItem('sda_logs')) || [];
        if(logs.length === 0) return alert("Data kosong!");
        let csv = "Data Siswa,Waktu\n" + logs.map(l => `"${l.info}","${l.time}"`).join("\n");
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "absensi_sda.csv";
        a.click();
    }

    function clearData() {
        if(confirm("Hapus semua riwayat scan?")) {
            localStorage.removeItem('sda_logs');
            renderTable();
        }
    }

    function beep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.1);
    }

    renderTable();
</script>

</body>
</html>
