<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDA Music - Management System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 800px; margin: auto; } /* Dilebarkan dikit buat kolom catatan */
        
        .form-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; text-align: left; }
        .input-group { margin-bottom: 15px; display: flex; align-items: center; }
        .input-group label { width: 100px; font-weight: bold; font-size: 14px; }
        .input-group input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        
        .id-card {
            width: 300px; height: 480px; background: white; border-radius: 15px;
            border: 1px solid #ccc; box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            position: relative; overflow: hidden; display: none; margin: auto;
        }
        .card-header { background: #28a745; color: white; padding: 20px 10px; font-weight: bold; font-size: 18px; border-bottom: 5px solid #218838; }
        .card-body { padding: 20px; }
        .student-name { font-size: 20px; font-weight: bold; margin-top: 15px; text-transform: uppercase; }
        #qrcode { display: flex; justify-content: center; margin: 20px 0; }
        
        .btn { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; color: white; transition: 0.3s; margin: 2px; }
        .btn-primary { background: #007bff; }
        .btn-success { background: #28a745; }
        .btn-warning { background: #ffc107; color: #212529; }
        .btn-danger { background: #dc3545; }
        .btn-block { width: 100%; margin: 10px 0; }

        #reader { width: 100%; background: white; border-radius: 10px; overflow: hidden; border: 2px solid #ddd; margin-bottom: 20px; }
        
        /* SCROLL TABEL */
        .table-container {
            max-height: 400px; overflow-y: auto; background: white;
            border: 1px solid #ddd; border-radius: 8px; margin-top: 10px;
        }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { position: sticky; top: 0; background: #eee; padding: 12px; font-size: 13px; z-index: 10; border-bottom: 2px solid #ccc; }
        td { border-bottom: 1px solid #ddd; padding: 10px; font-size: 13px; text-align: left; }

        /* Input Catatan di Tabel */
        .note-input { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }

        @media print {
            body * { visibility: hidden; }
            #id-card-result, #id-card-result * { visibility: visible; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>SDA Music Management</h2>

    <div class="form-card">
        <h3 style="text-align: center;">ID Card Generator</h3>
        <div class="input-group"><label>Nama</label><input type="text" id="inputNama" placeholder="Nama Lengkap"></div>
        <div class="input-group"><label>Join Date</label><input type="date" id="inputJoinDate"></div>
        <button class="btn btn-primary btn-block" onclick="generateIDCard()">Generate Kartu</button>
    </div>

    <div id="id-card-result">
        <div id="printableCard" class="id-card">
            <div class="card-header">SDA MUSIC<br><span style="font-size: 11px; font-weight: normal;">Student ID Card</span></div>
            <div class="card-body">
                <div id="qrcode"></div>
                <div class="student-name" id="displayNama">NAMA SISWA</div>
                <div style="font-size: 14px; color: #666; margin-bottom: 20px;">Joined: <span id="displayJoinDate">-</span></div>
                <hr><p style="font-size: 9px; color: #999;">Tanda pengenal resmi siswa SDA Music</p>
            </div>
        </div>
    </div>

    <div style="margin-top: 10px;">
        <button id="btnPrint" class="btn btn-success" style="display:none;" onclick="window.print()">Cetak</button>
        <button id="btnDownload" class="btn btn-warning" style="display:none;" onclick="downloadImage()">Download PNG</button>
    </div>

    <hr style="margin: 30px 0;">

    <h3>Absensi & Jurnal Harian</h3>
    <button id="start-btn" class="btn btn-success btn-block" onclick="startScanner()">Aktifkan Kamera</button>
    <div id="reader"></div>
    <div id="result" style="display:none; background: #e7ffea; padding: 15px; margin-bottom: 20px; border: 1px solid #28a745; border-radius: 8px;">
        <strong>Terdeteksi:</strong> <span id="scan-text"></span>
    </div>

    <div style="display: flex; gap: 5px;">
        <button class="btn btn-primary" style="flex: 1;" onclick="downloadCSV()">Download CSV</button>
        <button class="btn btn-danger" style="flex: 1;" onclick="clearData()">Hapus Semua</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 30%;">Siswa / ID</th>
                    <th style="width: 25%;">Waktu Scan</th>
                    <th style="width: 45%;">Catatan Pelajaran</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<script>
    // GENERATE KARTU
    function generateIDCard() {
        const nama = document.getElementById('inputNama').value;
        const joinDate = document.getElementById('inputJoinDate').value;
        if(!nama || !joinDate) return alert("Lengkapi data!");

        document.getElementById('displayNama').innerText = nama;
        document.getElementById('displayJoinDate').innerText = joinDate;
        document.getElementById('printableCard').style.display = 'block';
        document.getElementById('btnPrint').style.display = 'inline-block';
        document.getElementById('btnDownload').style.display = 'inline-block';

        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: `SDA-${nama}-${joinDate}`, width: 150, height: 150 });
    }

    function downloadImage() {
        html2canvas(document.getElementById('printableCard'), { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `SDA-${document.getElementById('displayNama').innerText}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    // SCANNER LOGIC
    let html5QrCode;
    function startScanner() {
        document.getElementById('start-btn').style.display = 'none';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 15, qrbox: 250 }, 
            (text) => {
                if(saveData(text)) {
                    document.getElementById('scan-text').innerText = text;
                    document.getElementById('result').style.display = 'block';
                    beep();
                }
            }
        ).catch(err => alert("Izin kamera ditolak atau error."));
    }

    function saveData(val) {
        const now = new Date();
        const timeStr = now.toLocaleString('id-ID');
        let logs = JSON.parse(localStorage.getItem('sda_logs')) || [];
        // Cooldown 3 detik
        if(logs.length > 0 && logs[0].info === val) {
            if(new Date() - new Date(logs[0].ts) < 3000) return false;
        }

        // Tambah properti 'note' kosong di awal
        logs.unshift({ info: val, time: new Date().toLocaleString('id-ID'), ts: new Date(), note: "" });
        localStorage.setItem('sda_logs', JSON.stringify(logs));
        renderTable();
        return true;
    }

    // FUNGSI BARU: Simpan Catatan dari Tabel
    function saveNote(index) {
        let logs = JSON.parse(localStorage.getItem('sda_logs')) || [];
        const noteValue = document.getElementById(`note-${index}`).value;
        logs[index].note = noteValue;
        localStorage.setItem('sda_logs', JSON.stringify(logs));
        alert("Catatan untuk " + logs[index].info.split('-')[1] + " berhasil disimpan!");
    }

    function renderTable() {
        let logs = JSON.parse(localStorage.getItem('sda_logs')) || [];
        document.getElementById('historyBody').innerHTML = logs.map((i, index) => `
            <tr>
                <td>${i.info}</td>
                <td>${i.time}</td>
                <td>
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="note-${index}" class="note-input" value="${i.note || ''}" placeholder="Materi/progres...">
                        <button class="btn btn-success" style="padding: 5px 10px; font-size: 11px;" onclick="saveNote(${index})">Save</button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function downloadCSV() {
        let logs = JSON.parse(localStorage.getItem('sda_logs')) || [];
        if(logs.length === 0) return alert("Data kosong!");

        const now = new Date();
        const namaFile = `${now.toLocaleDateString('id-ID', { weekday: 'long' })}-${now.getHours()}${now.getMinutes()}-absensi_sda.csv`;

        // Update header CSV dengan kolom Catatan
        let csv = "Data Siswa,Waktu,Catatan\n" + logs.map(l => `"${l.info}","${l.time}","${l.note || ''}"`).join("\n");
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = namaFile;
        a.click();
    }

    function clearData() {
        if(confirm("Hapus semua data?")) {
            localStorage.removeItem('sda_logs');
            renderTable();
        }
    }

    function beep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.1);
    }

    renderTable();
</script>

</body>
</html>
