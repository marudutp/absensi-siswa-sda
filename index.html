<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDA Music - Management System</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --primary: #007bff; --success: #28a745; --warning: #ffc107;
            --danger: #dc3545; --info: #17a2b8; --light: #f0f2f5; --dark: #333;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; padding: 20px; background: var(--light); color: var(--dark); margin: 0; }
        .container { max-width: 850px; margin: auto; padding-bottom: 50px; }
        
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 30px; text-align: left; }
        .input-group { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .input-group label { width: 100px; font-weight: bold; font-size: 14px; }
        .input-group input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        
        #id-card-result { display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
        .id-card {
            width: 320px; height: 500px; background: white; border-radius: 20px;
            border: 1px solid #ccc; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            position: relative; overflow: hidden; display: none; margin-bottom: 20px;
        }
        .card-header { background: var(--success); color: white; padding: 25px 10px; font-weight: bold; font-size: 20px; border-bottom: 6px solid #1e7e34; text-align: center; }
        .card-body { padding: 20px; text-align: center; }
        .student-name { font-size: 22px; font-weight: bold; margin-top: 15px; text-transform: uppercase; }
        #qrcode { display: flex; justify-content: center; margin: 25px 0; padding: 10px; background: #fff; }
        
        .btn { padding: 12px 18px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; color: white; transition: 0.3s; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-warning { background: var(--warning); color: #212529; }
        .btn-danger { background: var(--danger); }
        .btn-block { width: 100%; margin: 10px 0; font-size: 16px; }

        #reader { width: 100%; background: white; border-radius: 12px; overflow: hidden; border: 2px solid #ddd; margin-top: 15px; }
        #result-box { display: none; background: #e7ffea; padding: 15px; margin-bottom: 20px; border: 1px solid var(--success); border-radius: 10px; }

        /* Fitur Search */
        .search-container { margin: 20px 0 10px 0; display: flex; gap: 10px; }
        .search-input { flex: 1; padding: 12px; border: 2px solid var(--primary); border-radius: 8px; font-size: 14px; outline: none; }

        .table-container { max-height: 450px; overflow-y: auto; background: white; border-radius: 10px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { position: sticky; top: 0; background: #f8f9fa; padding: 15px; font-size: 13px; z-index: 10; border-bottom: 2px solid #dee2e6; text-align: left; }
        td { border-bottom: 1px solid #eee; padding: 12px; font-size: 13px; text-align: left; }
        .note-input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }

        @media print {
            body * { visibility: hidden; }
            #printableCard, #printableCard * { visibility: visible; }
            #printableCard { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); border: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SDA Music</h1>
    <p style="color: #666; margin-bottom: 30px;">Digital Management System v3.1</p>

    <div class="card">
        <h3 style="text-align: center;">ID Card Generator</h3>
        <div class="input-group"><label>Nama</label><input type="text" id="inputNama" placeholder="Nama Lengkap Siswa..."></div>
        <div class="input-group"><label>Join Date</label><input type="date" id="inputJoinDate"></div>
        <button class="btn btn-primary btn-block" onclick="generateIDCard()">Generate Kartu</button>
    </div>

    <div id="id-card-result">
        <div id="printableCard" class="id-card">
            <div class="card-header">SDA MUSIC<br><span style="font-size: 12px; font-weight: normal; opacity: 0.9;">Student ID Card</span></div>
            <div class="card-body">
                <div id="qrcode"></div>
                <div class="student-name" id="displayNama">NAMA SISWA</div>
                <div style="font-size: 14px; color: #666; margin-bottom: 20px;">Joined: <span id="displayJoinDate">-</span></div>
                <hr style="border: 0; border-top: 1px solid #eee;">
                <p style="font-size: 10px; color: #999;">Tanda pengenal resmi sistem absensi SDA Music.</p>
            </div>
        </div>
        <div id="actionButtons" style="margin-bottom: 30px; display: none; gap: 8px; flex-wrap: wrap; justify-content: center;">
            <button class="btn btn-success" onclick="window.print()">Cetak</button>
            <button class="btn btn-warning" onclick="downloadImage()">Download PNG</button>
            <button class="btn btn-info" onclick="shareImage()">Share Kartu</button>
        </div>
    </div>

    <hr style="border: 0; border-top: 2px dashed #ccc; margin: 40px 0;">

    <h3>Scanner & Jurnal Guru</h3>
    <button id="start-btn" class="btn btn-success btn-block" onclick="startScanner()">Aktifkan Kamera</button>
    <div id="reader"></div>
    <div id="result-box"><strong>Terdeteksi:</strong> <br><span id="scan-text" style="font-size: 18px; color: var(--success); font-weight: bold;"></span></div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Cari nama siswa di riwayat..." oninput="renderTable()">
    </div>

    <div style="display: flex; gap: 8px; margin-bottom: 10px;">
        <button class="btn btn-primary" style="flex: 1;" onclick="downloadCSV()">Download CSV</button>
        <button class="btn btn-danger" style="flex: 1;" onclick="clearData()">Hapus Semua Data</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr><th style="width: 25%;">Siswa / ID</th><th style="width: 20%;">Waktu Scan</th><th style="width: 55%;">Catatan Pelajaran</th></tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "SDA123"; // Password untuk hapus data

    function generateIDCard() {
        const nama = document.getElementById('inputNama').value;
        const joinDate = document.getElementById('inputJoinDate').value;
        if(!nama || !joinDate) return alert("Lengkapi data!");
        document.getElementById('displayNama').innerText = nama;
        document.getElementById('displayJoinDate').innerText = joinDate;
        document.getElementById('printableCard').style.display = 'block';
        document.getElementById('actionButtons').style.display = 'flex';
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: `SDA-${nama}-${joinDate}`, width: 160, height: 160, correctLevel: QRCode.CorrectLevel.H });
    }

    function downloadImage() {
        html2canvas(document.getElementById('printableCard'), { scale: 3 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `SDA-${document.getElementById('displayNama').innerText}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    async function shareImage() {
        const canvas = await html2canvas(document.getElementById('printableCard'), { scale: 2 });
        canvas.toBlob(async (blob) => {
            const file = new File([blob], `SDA-Music-ID.png`, { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: 'Kartu Siswa SDA Music' });
            } else { alert("Gunakan Download PNG."); }
        });
    }

    let html5QrCode;
    function startScanner() {
        document.getElementById('start-btn').style.display = 'none';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
            if(saveData(text)) {
                document.getElementById('scan-text').innerText = text;
                document.getElementById('result-box').style.display = 'block';
                beep();
            }
        });
    }

    function saveData(val) {
        let logs = JSON.parse(localStorage.getItem('sda_logs')) || [];
        if(logs.length > 0 && logs[0].info === val && (new Date() - new Date(logs[0].ts) < 5000)) return false;
        logs.unshift({ info: val, time: new Date().toLocaleString('id-ID'), ts: new Date(), note: "" });
        localStorage.setItem('sda_logs', JSON.stringify(logs));
        renderTable();
        return true;
    }

    function saveNote(index) {
        let logs = JSON.parse(localStorage.getItem('sda_logs')) || [];
        logs[index].note = document.getElementById(`note-${index}`).value;
        localStorage.setItem('sda_logs', JSON.stringify(logs));
        const btn = event.target; btn.innerText = "Saved!"; btn.style.background = "#000";
        setTimeout(() => { btn.innerText = "Save"; btn.style.background = ""; }, 1500);
    }

    function renderTable() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        let logs = JSON.parse(localStorage.getItem('sda_logs')) || [];
        
        const filteredLogs = logs.filter(log => log.info.toLowerCase().includes(searchTerm));

        document.getElementById('historyBody').innerHTML = filteredLogs.map((i, index) => `
            <tr>
                <td><strong>${i.info}</strong></td>
                <td>${i.time}</td>
                <td>
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="note-${index}" class="note-input" value="${i.note || ''}" placeholder="Materi...">
                        <button class="btn btn-success" style="padding: 5px 10px; font-size: 11px;" onclick="saveNote(${index})">Save</button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function downloadCSV() {
        let logs = JSON.parse(localStorage.getItem('sda_logs')) || [];
        const now = new Date();
        const fileName = `Rekap-${now.getHours()}${now.getMinutes()}-sda.csv`;
        let csv = "ID Siswa,Waktu,Catatan\n" + logs.map(l => `"${l.info}","${l.time}","${l.note}"`).join("\n");
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = fileName; a.click();
    }

    function clearData() {
        const pass = prompt("Masukkan Password Guru untuk menghapus semua data:");
        if (pass === ADMIN_PASSWORD) {
            if(confirm("Konfirmasi akhir: Hapus permanen semua riwayat?")) {
                localStorage.removeItem('sda_logs');
                renderTable();
            }
        } else if (pass !== null) {
            alert("Password Salah! Data gagal dihapus.");
        }
    }

    function beep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 880; gain.gain.value = 0.1;
        osc.start(); osc.stop(ctx.currentTime + 0.1);
    }

    renderTable();
</script>
</body>
</html>
