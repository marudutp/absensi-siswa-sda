<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDA Music - System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 600px; margin: auto; }
        
        /* Form Label Styling */
        .form-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; text-align: left; }
        .input-group { margin-bottom: 15px; display: flex; align-items: center; }
        .input-group label { width: 100px; font-weight: bold; font-size: 14px; }
        .input-group input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        
        /* Style ID Card Vertikal */
        #id-card-result { display: flex; justify-content: center; margin-top: 20px; }
        .id-card {
            width: 300px;
            height: 480px;
            background: white;
            border-radius: 15px;
            border: 1px solid #ccc;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
            display: none;
        }
        .card-header { background: #28a745; color: white; padding: 20px 10px; font-weight: bold; font-size: 18px; border-bottom: 5px solid #218838; text-align: center; }
        .card-body { padding: 20px; text-align: center; }
        .student-name { font-size: 20px; font-weight: bold; margin-top: 15px; text-transform: uppercase; }
        .join-date { font-size: 14px; color: #666; margin-bottom: 20px; }
        #qrcode { display: flex; justify-content: center; margin: 20px 0; }
        
        /* Buttons */
        .btn { padding: 12px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; color: white; transition: 0.3s; margin: 5px; }
        .btn-primary { background: #007bff; }
        .btn-success { background: #28a745; }
        .btn-warning { background: #ffc107; color: #212529; }
        .btn-danger { background: #dc3545; }
        
        #reader { width: 100%; background: white; border-radius: 10px; overflow: hidden; border: 2px solid #ddd; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; font-size: 13px; }
        
        @media print {
            body * { visibility: hidden; }
            #id-card-result, #id-card-result * { visibility: visible; }
            #id-card-result { position: absolute; left: 0; top: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>SDA Music Management</h2>

    <div class="form-card">
        <h3 style="text-align: center;">Buat Kartu Siswa</h3>
        <div class="input-group">
            <label for="inputNama">Nama</label>
            <input type="text" id="inputNama" placeholder="Contoh: Budi Santoso">
        </div>
        <div class="input-group">
            <label for="inputJoinDate">Join Date</label>
            <input type="date" id="inputJoinDate">
        </div>
        <button class="btn btn-primary" onclick="generateIDCard()" style="width: 100%;">Generate Kartu</button>
    </div>

    <div id="id-card-result">
        <div id="printableCard" class="id-card">
            <div class="card-header">
                SDA MUSIC<br>
                <span style="font-size: 12px; font-weight: normal;">Student ID Card</span>
            </div>
            <div class="card-body">
                <div id="qrcode"></div>
                <div class="student-name" id="displayNama">NAMA SISWA</div>
                <div class="join-date">Joined: <span id="displayJoinDate">-</span></div>
                <hr>
                <p style="font-size: 10px; color: #999;">Kartu ini merupakan tanda pengenal resmi siswa SDA Music</p>
            </div>
        </div>
    </div>

    <div id="actionButtons" style="margin-top: 15px;">
        <button id="btnPrint" class="btn btn-success" style="display:none;" onclick="window.print()">Cetak Kartu</button>
        <button id="btnDownload" class="btn btn-warning" style="display:none;" onclick="downloadImage()">Download Gambar</button>
    </div>

    <hr style="margin: 40px 0;">

    <h3>Absensi Scanner</h3>
    <button id="start-btn" class="btn btn-success" onclick="startScanner()" style="width: 100%;">Aktifkan Kamera</button>
    <div id="reader"></div>
    <div id="result" style="display:none; background: #e7ffea; padding: 15px; margin-bottom: 20px;">
        <strong>Terdeteksi:</strong> <br>
        <span id="scan-text"></span>
    </div>

    <table>
        <thead><tr><th>Siswa / ID</th><th>Waktu Scan</th></tr></thead>
        <tbody id="historyBody"></tbody>
    </table>
</div>

<script>
    function generateIDCard() {
        const nama = document.getElementById('inputNama').value;
        const joinDate = document.getElementById('inputJoinDate').value;
        if(!nama || !joinDate) return alert("Lengkapi data dulu Lur!");

        document.getElementById('displayNama').innerText = nama;
        document.getElementById('displayJoinDate').innerText = joinDate;
        document.getElementById('printableCard').style.display = 'block';
        document.getElementById('btnPrint').style.display = 'inline-block';
        document.getElementById('btnDownload').style.display = 'inline-block';

        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: `SDA-${nama}-${joinDate}`,
            width: 150,
            height: 150
        });
    }

    // FUNGSI BARU: Download Kartu sebagai Gambar
    function downloadImage() {
        const card = document.getElementById('printableCard');
        const namaSiswa = document.getElementById('displayNama').innerText;
        
        // Memastikan background tetap putih saat di-render ke canvas
        html2canvas(card, { backgroundColor: null, scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Kartu-SDA-${namaSiswa}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }

    // LOGIC SCANNER
    let html5QrCode;
    function startScanner() {
        document.getElementById('start-btn').style.display = 'none';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
            if(saveData(text)) {
                document.getElementById('scan-text').innerText = text;
                document.getElementById('result').style.display = 'block';
                beep();
            }
        });
    }

    function saveData(val) {
        let logs = JSON.parse(localStorage.getItem('sda_logs')) || [];
        logs.unshift({ info: val, time: new Date().toLocaleString('id-ID') });
        localStorage.setItem('sda_logs', JSON.stringify(logs));
        renderTable();
        return true;
    }

    function renderTable() {
        let logs = JSON.parse(localStorage.getItem('sda_logs')) || [];
        document.getElementById('historyBody').innerHTML = logs.map(i => `<tr><td>${i.info}</td><td>${i.time}</td></tr>`).join('');
    }

    function beep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.1);
    }

    renderTable();
</script>
</body>
</html>
